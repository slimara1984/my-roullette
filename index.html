<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette AI</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #2c3e50; color: white; font-family: sans-serif; }
        #wheel { width: 300px; height: 300px; border: 10px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; transition: transform 3s ease-out; background: conic-gradient(red 0deg, yellow 90deg, green 180deg, blue 270deg); }
        button { margin-top: 30px; padding: 15px 40px; font-size: 20px; border-radius: 25px; border: none; background: #e74c3c; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="wheel">START</div>
    <button onclick="spin()">დატრიალება</button>

    <script>
        function spin() {
            const wheel = document.getElementById('wheel');
            let rotation = Math.ceil(Math.random() * 3600) + 360;
            wheel.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
