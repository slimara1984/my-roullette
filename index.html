<body>

<div id="topBar">
  <h2>🎰 ROULETTE v12.5</h2>
  <button id="btnTab" class="btn">📺 ვიდეო</button>

<div id="main">

  <div id="panel">

      <div class="inp-row"><label>⏮ საწყისი:</label><input type="number" id="startNum" value="0"></div>

      <button id="btnAnalyze">🔮 ანალიზი</button>
    </div>
    <div id="analysisOutput" style="color:#71717a;margin-top:2px">შემოყვანეთ მონაცემები...</div>
  </div>
</div>

<!-- canvas-ები hidden -->
<canvas id="c8"    style="display:none" width="8"  height="8"></canvas>
<canvas id="cBall" style="display:none" width="32" height="8"></canvas>

<script>
// ================================================================
// ROULETTE AI v12.5 — Smart Ball Reflect-Strip Detector
// ================================================================

const WHL = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];

// --- AI მდგომარეობა ---
let AI_STATE = {
  gamma:            parseFloat(localStorage.getItem('ai_gamma'))  || 0.1450,
  hardwareOffset:   parseFloat(localStorage.getItem('ai_offset')) || -4.00,
  totalSpinsLearned:parseInt(localStorage.getItem('ai_spins'))    || 0
};

function updateBrainDashboard(){
  document.getElementById('bGamma').textContent  = AI_STATE.gamma.toFixed(4);
  document.getElementById('bOffset').textContent = AI_STATE.hardwareOffset.toFixed(2);
  document.getElementById('bSpins').textContent  = AI_STATE.totalSpinsLearned;
}
updateBrainDashboard();

// --- DOM ---
const vid       = document.getElementById('vid');
const wrapper   = document.getElementById('videoSide');
const ctx8      = document.getElementById('c8').getContext('2d',{willReadFrequently:true});
const ctxBall   = document.getElementById('cBall').getContext('2d',{willReadFrequently:true});
const statusTxt = document.getElementById('statusTxt');
const output    = document.getElementById('analysisOutput');
const btnSS     = document.getElementById('btnSS');
const dbgBar    = document.getElementById('dbgBar');
const sW        = {el:document.getElementById('sw')};
const sB        = {el:document.getElementById('sb')};

// --- სლაიდერები ---
function sl(id, outId){
  const e = document.getElementById(id), o = document.getElementById(outId);
  e.addEventListener('input', () => { o.textContent = e.value; });
  return e;
}
const greenStrictSl  = sl('greenStrict','sv1');
const reflectSensSl  = sl('reflectSens','sv2');

// --- ჩაწერის მდგომარეობა ---
let isRecording     = false;
let rawWheelPasses  = [];
let ballPasses      = [];
let startTime       = 0;
let stopTime        = 0;
let lastWheelPassTime = -999;
let ballLockoutUntil  = 0;
let currentFacingMode = "environment";

// ================================================================
// ბურთის სმარტ დეტექტორის ცვლადები
// ================================================================
const BALL_W      = 32;   // canvas სიგანე ბურთის სენსორისთვის
const BALL_H      = 8;    // canvas სიმაღლე

let baseProfile   = null; // ფონის baseline brightness პროფილი
let baseCount     = 0;    // baseline კადრების მრიცხველი
let prevProfile   = null; // წინა კადრის პროფილი

let peakHistory   = [];   // smoothing ფანჯარა
const PEAK_WINDOW = 5;

// სტეიტ მანქანა: idle → rising → cooldown
let ballState     = 'idle';
let consecutiveHigh = 0;
let consecutiveLow  = 0;
let lastPeakVal   = 0;

// ================================================================
// კამერა
// ================================================================
async function initCamera(){
  if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode: currentFacingMode}, audio:false
    });
    vid.srcObject = stream;
    statusTxt.textContent = currentFacingMode==="environment" ? 'უკანა კამერა' : 'წინა კამერა';
    statusTxt.style.color = '#3b82f6';
  } catch(e){
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
      vid.srcObject = stream;
    } catch(err){ alert("კამერა ვერ ჩაირთო: " + err.message); }
  }
}

document.getElementById('btnTab').addEventListener('click', () => {
  currentFacingMode = currentFacingMode==="environment" ? "user" : "environment";
  initCamera();
});

// ================================================================
// START / STOP
// ================================================================
btnSS.addEventListener('click', () => {
  isRecording = !isRecording;
  if(isRecording){
    startTime = performance.now();
    rawWheelPasses = []; ballPasses = [];
    ballLockoutUntil = 0; lastWheelPassTime = -999;
    // ბურთის სენსორის reset
    baseProfile = null; baseCount = 0; prevProfile = null;
    peakHistory = []; ballState = 'idle';
    consecutiveHigh = 0; consecutiveLow = 0; lastPeakVal = 0;
    btnSS.textContent = '⏹ STOP'; btnSS.style.background = '#b91c1c';
    statusTxt.textContent = 'იწერება...';
  } else {
    stopTime = performance.now();
    btnSS.textContent = '▶ START'; btnSS.style.background = '#16a34a';
    statusTxt.textContent = 'მზადაა';
  }
});

// ================================================================
// Drag & Resize სენსორები
// ================================================================
function setTouchDrag(el, keepHeight){
  let dragging=false, resizing=false, sx, sy, sl2, st, sw2;

  function start(x, y, isRes){
    if(isRes){ resizing=true; sw2=el.offsetWidth; }
    else      { dragging=true; sl2=el.offsetLeft; st=el.offsetTop; }
    sx=x; sy=y;
  }
  function move(x, y){
    if(dragging){
      el.style.left = (sl2 + x - sx) + 'px';
      el.style.top  = (st  + y - sy) + 'px';
    }
    if(resizing){
      const nw = Math.max(30, sw2 + (x - sx));
      el.style.width = nw + 'px';
      if(!keepHeight) el.style.height = nw + 'px';
    }
  }

  el.addEventListener('mousedown', e => start(e.clientX, e.clientY, e.target.className==='resizer'));
  el.addEventListener('touchstart', e => { const t=e.touches[0]; start(t.clientX, t.clientY, e.target.className==='resizer'); });
  window.addEventListener('mousemove', e => { if(dragging||resizing) move(e.clientX, e.clientY); });
  window.addEventListener('touchmove', e => { if(dragging||resizing){ const t=e.touches[0]; move(t.clientX, t.clientY); }});
  window.addEventListener('mouseup',  () => { dragging=false; resizing=false; });
  window.addEventListener('touchend', () => { dragging=false; resizing=false; });
}
setTouchDrag(sW.el, false);  // მწვანე: კვადრატი/წრე
setTouchDrag(sB.el, true);   // ბურთი: სიმაღლე ფიქსირებული

// ================================================================
// sample — ვიდეოდან pixel მონაცემი
// ================================================================
function sample(el, ctx, sw, sh){
  const vw = vid.videoWidth, vh = vid.videoHeight;
  if(!vw || !vh) return new Uint8ClampedArray(sw*sh*4);
  const r = vid.getBoundingClientRect();
  const scaleX = vw / r.width, scaleY = vh / r.height;
  const sx = ((el.offsetLeft + wrapper.offsetLeft) - r.left) * scaleX;
  const sy = ((el.offsetTop  + wrapper.offsetTop ) - r.top ) * scaleY;
  const sw2 = Math.max(4, el.offsetWidth  * scaleX);
  const sh2 = Math.max(4, el.offsetHeight * scaleY);
  ctx.clearRect(0, 0, sw, sh);
  ctx.drawImage(vid, sx, sy, sw2, sh2, 0, 0, sw, sh);
  return ctx.getImageData(0, 0, sw, sh).data;
}

// ================================================================
// მწვანე ფერის დეტექტორი (უცვლელი)
// ================================================================
function isGreen(r, g, b, lv){
  return g>(48+lv*7) && g>r*(1.12+lv*0.06) && g>b*(1.12+lv*0.06) && r<g*(0.88-lv*0.05);
}

// ================================================================
// brightness პროფილი სენსორ ზოლიდან
// სვეტების (columns) საშუალო luminance
// ================================================================
function getBrightnessProfile(data, W, H){
  const prof = new Float32Array(W);
  for(let x = 0; x < W; x++){
    let sum = 0;
    for(let y = 0; y < H; y++){
      const i = (y * W + x) * 4;
      const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
      // ვერცხლის / ნეიტრალი ფერის ბონუსი
      // (R≈G≈B და საშუალო+ brightness => ვერცხლი)
      const mn  = Math.min(data[i], data[i+1], data[i+2]);
      const mx  = Math.max(data[i], data[i+1], data[i+2]);
      const sat = mx > 0 ? (mx - mn) / mx : 0;
      const silverBonus = (lum > 55 && sat < 0.38) ? lum * 0.35 : 0;
      sum += lum + silverBonus;
    }
    prof[x] = sum / H;
  }
  return prof;
}

// ================================================================
// ბურთის სმარტ დეტექტორი
// — ვეძებთ ლოკალიზებულ bright spot-ს ვერცხლის ბილიკში
// — ეკრანის ციმციმი: მთელი ზოლი ერთნაირად ანათებს (spatial ≠ peak)
// — ბურთი: ერთი ადგილი ანათებს, გვერდები კი ნაკლებად
// ================================================================
function detectBallInReflectStrip(now, ts){
  const bd   = sample(sB.el, ctxBall, BALL_W, BALL_H);
  const prof = getBrightnessProfile(bd, BALL_W, BALL_H);

  // --- 1. Baseline კალიბრაცია (პირველი 25 კადრი) ---
  if(baseCount < 25){
    if(!baseProfile){
      baseProfile = new Float32Array(BALL_W);
      for(let x = 0; x < BALL_W; x++) baseProfile[x] = prof[x];
    } else {
      for(let x = 0; x < BALL_W; x++) baseProfile[x] = baseProfile[x]*0.82 + prof[x]*0.18;
    }
    baseCount++;
    prevProfile = prof;
    dbgBar.textContent = `⏳ baseline კალიბრაცია: ${baseCount}/25`;
    return;
  }

  // --- 2. Peak diff vs baseline ---
  let maxDiff = 0, peakCol = -1;
  for(let x = 0; x < BALL_W; x++){
    const d = prof[x] - baseProfile[x];
    if(d > maxDiff){ maxDiff = d; peakCol = x; }
  }

  // --- 3. Spatial peak check ---
  // ბურთი = პატარა კაშკაშა წერტილი; ციმციმი = ყველგან
  let isSpatialPeak = false;
  if(peakCol >= 2 && peakCol <= BALL_W - 3){
    const neighbors = (prof[peakCol-2] + prof[peakCol-1] + prof[peakCol+1] + prof[peakCol+2]) / 4;
    isSpatialPeak = prof[peakCol] > neighbors * 1.28;
  }

  // --- 4. Smoothed peak ---
  peakHistory.push(maxDiff);
  if(peakHistory.length > PEAK_WINDOW) peakHistory.shift();
  const smoothedPeak = peakHistory.reduce((a,b) => a+b, 0) / peakHistory.length;

  // --- 5. Adaptive baseline (quiet frames only) ---
  const thr = parseInt(reflectSensSl.value);
  if(maxDiff < thr * 0.45 && !isSpatialPeak){
    for(let x = 0; x < BALL_W; x++) baseProfile[x] = baseProfile[x]*0.97 + prof[x]*0.03;
  }

  prevProfile = prof;

  // debug
  dbgBar.textContent = `⚪ peak:${maxDiff.toFixed(0)} smt:${smoothedPeak.toFixed(0)} thr:${thr} spat:${isSpatialPeak?'✓':'✗'} state:${ballState} hits:${ballPasses.length}`;

  // --- 6. სტეიტ მანქანა ---
  const HIGH = thr;
  const LOW  = thr * 0.45;

  if(ballState === 'idle'){
    if(smoothedPeak >= HIGH && isSpatialPeak){
      consecutiveHigh++;
      if(consecutiveHigh >= 2){ ballState = 'rising'; lastPeakVal = smoothedPeak; consecutiveHigh = 0; }
    } else {
      consecutiveHigh = 0;
    }

  } else if(ballState === 'rising'){
    if(smoothedPeak >= lastPeakVal * 0.58 && isSpatialPeak){
      lastPeakVal = Math.max(lastPeakVal, smoothedPeak);
    } else {
      // პიკი ჩაეცა = ბურთი გაიარა!
      if(now > ballLockoutUntil){
        sB.el.classList.add('act');
        ballPasses.push(ts);
        ballLockoutUntil = now + 290;
        // სიჩქარის ჩვენება
        if(ballPasses.length >= 2){
          const iv = ballPasses[ballPasses.length-1] - ballPasses[ballPasses.length-2];
          if(iv > 0.08 && iv < 3.5) document.getElementById('bBallHz').textContent = (1/iv).toFixed(2)+'Hz';
        }
        setTimeout(() => sB.el.classList.remove('act'), 130);
      }
      ballState = 'cooldown';
      consecutiveLow = 0;
    }

  } else if(ballState === 'cooldown'){
    if(smoothedPeak < LOW){
      consecutiveLow++;
      if(consecutiveLow >= 3){ ballState = 'idle'; consecutiveLow = 0; }
    } else {
      consecutiveLow = 0;
    }
  }
}

// ================================================================
// მთავარი დამუშავების loop
// ================================================================
function syncProcessingLoop(){
  if(isRecording && vid.readyState >= 3){
    const now = performance.now();
    const ts  = (now - startTime) / 1000;

    // 🟢 მწვანე სენსორი (უცვლელი)
    const wd = sample(sW.el, ctx8, 8, 8);
    let gc = 0;
    for(let i = 0; i < wd.length; i += 4)
      if(isGreen(wd[i], wd[i+1], wd[i+2], parseInt(greenStrictSl.value))) gc++;
    if(gc >= 4 && (ts - lastWheelPassTime) > 1.5){
      sW.el.classList.add('act');
      rawWheelPasses.push(ts);
      lastWheelPassTime = ts;
      setTimeout(() => sW.el.classList.remove('act'), 150);
    }

    // 🥎 ბურთის ახალი სმარტ სენსორი
    detectBallInReflectStrip(now, ts);
  }

  if(vid.requestVideoFrameCallback) vid.requestVideoFrameCallback(syncProcessingLoop);
  else requestAnimationFrame(syncProcessingLoop);
}
if(vid.requestVideoFrameCallback) vid.requestVideoFrameCallback(syncProcessingLoop);
else requestAnimationFrame(syncProcessingLoop);

// ================================================================
// ფიზიკის გამოთვლა
// ================================================================
function calculatePhysics(wheelMS, ballMS, gamma, offset){
  const omega_b    = (2 * Math.PI) / (ballMS / 1000.0);
  const omega_crit = 5.30;
  if(omega_b <= omega_crit) return {offset: offset, laps: 0, t_drop: 0};
  const t_drop          = Math.log(omega_b / omega_crit) / gamma;
  const theta_ball      = (omega_b / gamma) * (1 - Math.exp(-gamma * t_drop));
  const ballLapsRemaining = theta_ball / (2 * Math.PI);
  const omega_w         = (2 * Math.PI) / (wheelMS / 1000.0);
  const theta_wheel     = omega_w * t_drop;
  const finalOffset     = offset + (((ballLapsRemaining * 37) - (theta_wheel / (2 * Math.PI) * 37)) % 37);
  return {offset: finalOffset, t_drop: t_drop};
}

// ================================================================
// ანალიზი
// ================================================================
document.getElementById('btnAnalyze').addEventListener('click', () => {
  const startN  = parseInt(document.getElementById('startNum').value);
  const actualN = parseInt(document.getElementById('actualNum').value);
  if(isNaN(startN) || isNaN(actualN)) return alert("შეავსეთ რიცხვები!");

  // დაფის ბოლო ორი გავლა
  let wLaps = [];
  rawWheelPasses.forEach(t => {
    if(!wLaps.length || (t - wLaps[wLaps.length-1]) > 1.5) wLaps.push(t);
  });
  if(wLaps.length < 2) return alert("დაფის არასაკმარისი მონაცემები!\n(საჭიროა მინ. 2 გავლა)");

  const t_zero_start = wLaps[wLaps.length-2];
  const t_zero_end   = wLaps[wLaps.length-1];
  const wheelMS      = Math.round((t_zero_end - t_zero_start) * 1000);

  // ბურთის გავლების ინტერპოლაცია
  let fbp = [];
  if(ballPasses.length){
    fbp.push(ballPasses[0]);
    let elt = 0.5;
    for(let i = 1; i < ballPasses.length; i++){
      if(ballPasses[i] - ballPasses[i-1] < 0.30) continue;
      let lc = Math.round((ballPasses[i] - ballPasses[i-1]) / elt);
      if(lc < 1) lc = 1;
      if(lc > 1 && lc < 5){
        let st = (ballPasses[i] - ballPasses[i-1]) / lc;
        for(let j = 1; j < lc; j++) fbp.push(ballPasses[i-1] + st*j);
      }
      fbp.push(ballPasses[i]);
      elt = (ballPasses[i] - ballPasses[i-1]) / lc;
    }
  }

  let validHits = fbp.filter(t => t >= t_zero_start && t <= t_zero_end);
  if(validHits.length < 2) return alert("ბურთის არასაკმარისი იმპულსები!\n(საჭიროა 2+ hit ბოლო ორ გავლას შორის)");

  let intervals = [];
  for(let i = 1; i < validHits.length; i++){
    let d = Math.round((validHits[i] - validHits[i-1]) * 1000);
    if(d > 350 && d < 1800) intervals.push(d);
  }
  if(intervals.length === 0) return alert("ინტერვალები ვერ მოიძებნა!");

  let ballMS = intervals[intervals.length-1], msgWarning = "";
  if(intervals.length >= 2){
    let prev = intervals[intervals.length-2];
    if(ballMS < prev * 0.75){ ballMS = Math.round(prev * 1.06); msgWarning = "⚠️ აჩქარების ანომალია გაიფილტრა!"; }
  }

  let run = calculatePhysics(wheelMS, ballMS, AI_STATE.gamma, AI_STATE.hardwareOffset);
  const lapDur = wheelMS / 1000.0;
  let lp = ((validHits[validHits.length-1] - t_zero_start) / lapDur) % 1;
  if(lp < 0) lp += 1;

  let earlyIndex     = (WHL.indexOf(startN) + Math.round(lp * 37)) % 37;
  let predictedIndex = Math.round(earlyIndex + run.offset) % 37;
  if(predictedIndex < 0) predictedIndex += 37;
  let tN = WHL[predictedIndex];

  // AI სწავლება
  let actualIndex  = WHL.indexOf(actualN);
  let errorSectors = actualIndex - predictedIndex;
  if(errorSectors > 18) errorSectors -= 37;
  if(errorSectors < -18) errorSectors += 37;

  if(Math.abs(errorSectors) > 0 && Math.abs(errorSectors) < 15){
    AI_STATE.hardwareOffset += errorSectors * 0.12;
    if(run.t_drop > 0) AI_STATE.gamma -= (errorSectors / run.t_drop) * 0.0008;
    AI_STATE.gamma = Math.max(0.08, Math.min(0.22, AI_STATE.gamma));
    AI_STATE.totalSpinsLearned++;
    localStorage.setItem('ai_gamma',  AI_STATE.gamma);
    localStorage.setItem('ai_offset', AI_STATE.hardwareOffset);
    localStorage.setItem('ai_spins',  AI_STATE.totalSpinsLearned);
    updateBrainDashboard();
  }

  const n3=WHL[(predictedIndex-3+37)%37], n2=WHL[(predictedIndex-2+37)%37], n1=WHL[(predictedIndex-1+37)%37];
  const p1=WHL[(predictedIndex+1)%37],    p2=WHL[(predictedIndex+2)%37],    p3=WHL[(predictedIndex+3)%37];
  const zone = [tN,n1,n2,n3,p1,p2,p3];
  const won  = zone.includes(actualN);

  let html = `<div class="ratio-box"><span>⚙️ ${wheelMS}ms</span><span>🥎 ${ballMS}ms</span><span>🎯 R: ${(wheelMS/ballMS).toFixed(1)}</span></div>`;
  if(msgWarning) html += `<div class="warn-box">${msgWarning}</div>`;
  html += `<div class="pred-box">🔮 <b>პროგნოზი: ${tN}</b><br>🎯 ზონა: <span style="color:#fbbf24">${n3} ${n2} ${n1} [${tN}] ${p1} ${p2} ${p3}</span><br>`;
  html += `<div>${won ? '✅ <b>მოგება!</b>' : '❌ რეალური: ['+actualN+'] (AI შესწორდა)'}</div></div>`;
  output.innerHTML = html;
});

// ================================================================
// პირველი გაშვება
// ================================================================
initCamera();
</script>
