<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;color:#e4e4e7;font-family:monospace;font-size:11px;overflow:hidden;height:100vh;touch-action:none}
#topBar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#141417;border-bottom:1px solid #27272a}
#topBar h2{color:#00ffaa;font-size:11px;letter-spacing:0.5px}
.btn{padding:5px 10px;font-weight:bold;border:none;border-radius:4px;cursor:pointer;font-family:monospace;font-size:11px}
#btnTab{background:#2563eb;color:#fff}
#btnSS{background:#dc2626;color:#fff}
#statusTxt{color:#a1a1aa;font-size:11px}
#sliders{display:flex;gap:10px;align-items:center;padding:6px 10px;background:#0f0f11;border-bottom:1px solid #27272a;color:#a1a1aa;flex-wrap:wrap}
#sliders input[type=range]{width:65px}
.sv{font-weight:bold;color:#22c55e}
#brainState{background:#111827;border-bottom:1px solid #374151;padding:5px 10px;font-size:9px;color:#9ca3af;display:flex;gap:10px;flex-wrap:wrap}
.brain-val{color:#38bdf8;font-weight:bold}
#main{display:flex;flex-direction:column;height:calc(100vh - 95px);width:100vw}
#videoSide{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
video{width:100%;height:100%;object-fit:contain}

/* ======== სენსორები ======== */
.sensor{position:absolute;z-index:10;touch-action:none;cursor:move}

/* მწვანე - წრიული */
#sw{border:2px dashed #22c55e;border-radius:50%;width:35px;height:35px;left:35%;top:45%}
#sw.act{background:rgba(34,197,94,.55);box-shadow:0 0 12px #22c55e}

/* ბურთი - თავისუფალი ზომის ოთხკუთხედი */
#sb{border:2px solid #a78bfa;border-radius:5px;width:70px;height:30px;left:35%;top:25%}
#sb.act{background:rgba(167,139,250,.40);box-shadow:0 0 16px #a78bfa}

/* resize სახელური - ქვედა-მარჯვენა კუთხე */
.rsz{
  position:absolute;right:-1px;bottom:-1px;
  width:14px;height:14px;
  background:#a78bfa;border-radius:3px 0 3px 0;
  cursor:se-resize;z-index:11;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#fff;line-height:1
}
.rsz-w{
  position:absolute;right:-1px;bottom:-1px;
  width:14px;height:14px;
  background:#22c55e;border-radius:3px 0 3px 0;
  cursor:se-resize;z-index:11
}

#panel{height:155px;min-height:155px;background:#141417;padding:8px;border-top:1px solid #27272a;display:flex;flex-direction:column;gap:5px;overflow-y:auto}
.panel-grid{display:flex;gap:8px;align-items:center}
.inp-row{display:flex;align-items:center;gap:4px;flex:1}
.inp-row label{color:#a1a1aa;font-size:10px}
.inp-row input{width:40px;background:#09090b;color:#fbbf24;border:1px solid #3f3f46;padding:4px;text-align:center;font-weight:bold;border-radius:3px;font-size:11px}
#btnAnalyze{background:#7c3aed;color:#fff;padding:6px;font-size:11px;border:none;border-radius:4px;font-weight:bold;flex:1;cursor:pointer}
.ratio-box{background:#1e1b4b;padding:4px 6px;border-radius:4px;border:1px solid #4338ca;font-size:10px;line-height:1.3;display:flex;justify-content:space-between}
.pred-box{background:#1e3a8a;border:2px solid #3b82f6;padding:6px;border-radius:6px;margin-top:2px}
.warn-box{background:#78350f;border:1px solid #f59e0b;padding:3px;border-radius:3px;font-size:9px;color:#fef3c7}
#dbgBar{position:absolute;bottom:4px;left:4px;right:4px;background:rgba(0,0,0,.80);color:#a78bfa;font-size:9px;padding:3px 6px;border-radius:3px;z-index:20;pointer-events:none}
</style>
</head>
<body>

<div id="topBar">
  <h2>🎰 ROULETTE v12.6</h2>
  <button id="btnTab" class="btn">📺 ვიდეო</button>
  <button id="btnSS" class="btn">▶ START</button>
  <span id="statusTxt">გათიშული</span>
</div>

<div id="sliders">
  <label>🟢 მწვანე: <input type="range" id="greenStrict" min="1" max="5" value="3"> <span class="sv" id="sv1">3</span></label>
  <label>⚪ მგრძნობ: <input type="range" id="ballSens" min="2" max="40" value="12"> <span class="sv" id="sv2">12</span></label>
  <label>⏱ lockout: <input type="range" id="lockoutMs" min="100" max="800" value="300"> <span class="sv" id="sv3">300</span>ms</label>
</div>

<div id="brainState">
  <span>🧠 Gamma:<span class="brain-val" id="bGamma">0.1450</span></span>
  <span>📐 Offset:<span class="brain-val" id="bOffset">-4.00</span></span>
  <span>📊 Spins:<span class="brain-val" id="bSpins">0</span></span>
  <span>🥎 Hz:<span class="brain-val" id="bBallHz">--</span></span>
  <span>🔴 Hits:<span class="brain-val" id="bHits">0</span></span>
</div>

<div id="main">
  <div id="videoSide">
    <video id="vid" autoplay playsinline muted></video>
    <!-- მწვანე სენსორი -->
    <div id="sw" class="sensor"><div class="rsz-w"></div></div>
    <!-- ბურთის სენსორი -->
    <div id="sb" class="sensor"><div class="rsz">↘</div></div>
    <div id="dbgBar">▶ START დააჭირეთ...</div>
  </div>
  <div id="panel">
    <div class="panel-grid">
      <div class="inp-row"><label>⏮ საწყისი:</label><input type="number" id="startNum" value="0"></div>
      <div class="inp-row"><label>⏭ ჩავარდა:</label><input type="number" id="actualNum" value="0"></div>
      <button id="btnAnalyze">🔮 ანალიზი</button>
    </div>
    <div id="analysisOutput" style="color:#71717a;margin-top:2px">შემოყვანეთ მონაცემები...</div>
  </div>
</div>

<canvas id="c8"    style="display:none" width="8"  height="8"></canvas>
<canvas id="cBall" style="display:none" width="24" height="24"></canvas>

<script>
// ============================================================
// ROULETTE AI v12.6
// ============================================================
const WHL=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];

let AI={
  gamma:          parseFloat(localStorage.getItem('ai_gamma'))  || 0.1450,
  hardwareOffset: parseFloat(localStorage.getItem('ai_offset')) || -4.00,
  spins:          parseInt(localStorage.getItem('ai_spins'))    || 0
};
function saveBrain(){ localStorage.setItem('ai_gamma',AI.gamma); localStorage.setItem('ai_offset',AI.hardwareOffset); localStorage.setItem('ai_spins',AI.spins); }
function updateDash(){
  document.getElementById('bGamma').textContent  = AI.gamma.toFixed(4);
  document.getElementById('bOffset').textContent = AI.hardwareOffset.toFixed(2);
  document.getElementById('bSpins').textContent  = AI.spins;
}
updateDash();

const vid     = document.getElementById('vid');
const wrapper = document.getElementById('videoSide');
const ctx8    = document.getElementById('c8').getContext('2d',{willReadFrequently:true});
const ctxB    = document.getElementById('cBall').getContext('2d',{willReadFrequently:true});
const dbgBar  = document.getElementById('dbgBar');
const btnSS   = document.getElementById('btnSS');
const statusTxt = document.getElementById('statusTxt');
const output  = document.getElementById('analysisOutput');
const elSW    = document.getElementById('sw');
const elSB    = document.getElementById('sb');

// სლაიდერები
function makeSl(id,outId){ const e=document.getElementById(id),o=document.getElementById(outId); e.addEventListener('input',()=>o.textContent=e.value); return e; }
const greenSl   = makeSl('greenStrict','sv1');
const ballSensSl= makeSl('ballSens','sv2');
const lockoutSl = makeSl('lockoutMs','sv3');

// ============================================================
// DRAG + FREE RESIZE — ორივე სენსორი, სიგანე+სიმაღლე
// ============================================================
function makeDragResize(el, rszEl){
  let mode=null, startX, startY, origL, origT, origW, origH;

  function onStart(x, y, m){
    mode=m; startX=x; startY=y;
    origL=el.offsetLeft; origT=el.offsetTop;
    origW=el.offsetWidth; origH=el.offsetHeight;
  }

  // mouse
  rszEl.addEventListener('mousedown', e=>{ e.stopPropagation(); onStart(e.clientX,e.clientY,'resize'); });
  el.addEventListener('mousedown',    e=>{ if(e.target===rszEl||e.target.parentElement===rszEl) return; onStart(e.clientX,e.clientY,'drag'); });

  // touch
  rszEl.addEventListener('touchstart', e=>{ e.stopPropagation(); const t=e.touches[0]; onStart(t.clientX,t.clientY,'resize'); },{passive:true});
  el.addEventListener('touchstart',    e=>{ if(e.target===rszEl||e.target.parentElement===rszEl) return; const t=e.touches[0]; onStart(t.clientX,t.clientY,'drag'); },{passive:true});

  function onMove(x,y){
    if(!mode) return;
    const dx=x-startX, dy=y-startY;
    if(mode==='drag'){
      el.style.left = Math.max(0, origL+dx)+'px';
      el.style.top  = Math.max(0, origT+dy)+'px';
    } else {
      el.style.width  = Math.max(16, origW+dx)+'px';
      el.style.height = Math.max(10, origH+dy)+'px';
    }
  }
  function onEnd(){ mode=null; }

  window.addEventListener('mousemove', e=>onMove(e.clientX,e.clientY));
  window.addEventListener('touchmove', e=>{ const t=e.touches[0]; onMove(t.clientX,t.clientY); },{passive:true});
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

makeDragResize(elSW, elSW.querySelector('.rsz-w'));
makeDragResize(elSB, elSB.querySelector('.rsz'));

// ============================================================
// კამერა
// ============================================================
let facingMode="environment";
async function initCamera(){
  if(vid.srcObject) vid.srcObject.getTracks().forEach(t=>t.stop());
  try {
    vid.srcObject = await navigator.mediaDevices.getUserMedia({video:{facingMode},audio:false});
    statusTxt.textContent = facingMode==='environment'?'უკანა კამერა':'წინა კამერა';
    statusTxt.style.color='#3b82f6';
  } catch(e){
    try { vid.srcObject = await navigator.mediaDevices.getUserMedia({video:true,audio:false}); }
    catch(err){ alert('კამერა: '+err.message); }
  }
}
document.getElementById('btnTab').addEventListener('click',()=>{ facingMode=facingMode==='environment'?'user':'environment'; initCamera(); });

// ============================================================
// ჩაწერა START/STOP
// ============================================================
let isRec=false, recStart=0;
let wheelPasses=[], ballPasses=[];
let lastWheelT=-999, ballLockUntil=0;

// ბურთის სენსორის state
let prevAvg=null;         // წინა კადრის საშუალო brightness
let bgAvg=null;           // baseline (running average)
let spikeBuf=[];          // spike buffer სმუთინგისთვის
let inSpike=false;        // ახლა spike-ში ვართ
let spikeConsec=0;        // თანმიმდევრული spike კადრები
let quietConsec=0;        // spike-ის შემდეგ quiet კადრები

btnSS.addEventListener('click',()=>{
  isRec=!isRec;
  if(isRec){
    recStart=performance.now();
    wheelPasses=[];ballPasses=[];
    lastWheelT=-999;ballLockUntil=0;
    prevAvg=null;bgAvg=null;spikeBuf=[];
    inSpike=false;spikeConsec=0;quietConsec=0;
    btnSS.textContent='⏹ STOP';btnSS.style.background='#b91c1c';
    statusTxt.textContent='იწერება...';
    document.getElementById('bHits').textContent='0';
    document.getElementById('bBallHz').textContent='--';
  } else {
    btnSS.textContent='▶ START';btnSS.style.background='#16a34a';
    statusTxt.textContent='მზადაა';
  }
});

// ============================================================
// pixel sample — el-ის ადგილი ვიდეოდან
// ============================================================
function sampleEl(el, ctx, W, H){
  const vw=vid.videoWidth, vh=vid.videoHeight;
  if(!vw||!vh) return new Uint8ClampedArray(W*H*4);
  const rect=vid.getBoundingClientRect();
  const scX=vw/rect.width, scY=vh/rect.height;
  const sx=((el.offsetLeft+wrapper.offsetLeft)-rect.left)*scX;
  const sy=((el.offsetTop +wrapper.offsetTop )-rect.top )*scY;
  const sw=Math.max(4,el.offsetWidth*scX);
  const sh=Math.max(4,el.offsetHeight*scY);
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(vid,sx,sy,sw,sh,0,0,W,H);
  return ctx.getImageData(0,0,W,H).data;
}

function isGreen(r,g,b,lv){
  return g>(48+lv*7)&&g>r*(1.12+lv*0.06)&&g>b*(1.12+lv*0.06)&&r<g*(0.88-lv*0.05);
}

// ============================================================
// ბურთის სენსორი — FRAME DELTA მიდგომა
//
// ლოგიკა:
//  1. baseline bgAvg = running average quiet კადრებიდან
//  2. curAvg = მიმდინარე კადრის საშუალო brightness სენსორ არეაში
//  3. delta = curAvg - bgAvg  →  ბურთი ანათებს ვიდრე ფონი
//  4. spike: delta >= threshold  AND  delta > prevDelta*0.6 (მზარდი)
//  5. ბურთი გატარდა = spike დასრულდა (rising→falling transition)
//  6. ციმციმი filter: baseline-ის relative spike უნდა იყოს >15%
// ============================================================
function processBall(now, ts){
  const BD=24;
  const data = sampleEl(elSB, ctxB, BD, BD);

  // საშუალო brightness + ვერცხლის ბუსტი
  let sumL=0, n=BD*BD;
  for(let i=0;i<data.length;i+=4){
    const r=data[i],g=data[i+1],b=data[i+2];
    const lum=0.299*r+0.587*g+0.114*b;
    // ვერცხლი = neutral + bright
    const mn=Math.min(r,g,b), mx=Math.max(r,g,b);
    const sat=mx>0?(mx-mn)/mx:0;
    const bonus=(lum>50&&sat<0.35)?lum*0.3:0;
    sumL+=lum+bonus;
  }
  const curAvg=sumL/n;

  // baseline init
  if(bgAvg===null){ bgAvg=curAvg; prevAvg=curAvg; }

  const thr = parseInt(ballSensSl.value);   // threshold (სლაიდერი)
  const delta = curAvg - bgAvg;             // baseline-თან სხვაობა
  const relSpike = bgAvg>0 ? (delta/bgAvg)*100 : 0;  // %

  // spike = delta >= thr AND relative >8%
  const isHigh = delta>=thr && relSpike>=8;

  // --- state machine ---
  if(!inSpike){
    if(isHigh){
      spikeConsec++;
      if(spikeConsec>=2){ inSpike=true; quietConsec=0; }
    } else {
      spikeConsec=0;
      // baseline update მხოლოდ quiet კადრებზე
      bgAvg = bgAvg*0.96 + curAvg*0.04;
    }
  } else {
    // spike-ში ვართ — ველოდებით ვარდნას
    if(!isHigh){
      quietConsec++;
      if(quietConsec>=2){
        // SPIKE დასრულდა → ბურთი გაიარა!
        if(now>ballLockUntil){
          elSB.classList.add('act');
          ballPasses.push(ts);
          const lockMs=parseInt(lockoutSl.value);
          ballLockUntil=now+lockMs;
          document.getElementById('bHits').textContent=ballPasses.length;
          if(ballPasses.length>=2){
            const iv=ballPasses[ballPasses.length-1]-ballPasses[ballPasses.length-2];
            if(iv>0.05&&iv<4) document.getElementById('bBallHz').textContent=(1/iv).toFixed(2)+'Hz';
          }
          setTimeout(()=>elSB.classList.remove('act'),140);
        }
        inSpike=false; spikeConsec=0; quietConsec=0;
        bgAvg=bgAvg*0.96+curAvg*0.04;
      }
    } else {
      quietConsec=0;
    }
  }

  prevAvg=curAvg;
  dbgBar.textContent=`🥎 avg:${curAvg.toFixed(1)} bg:${bgAvg.toFixed(1)} Δ:${delta.toFixed(1)}(${relSpike.toFixed(0)}%) thr:${thr} | state:${inSpike?'SPIKE':'quiet'}(${inSpike?quietConsec:spikeConsec}) hits:${ballPasses.length}`;
}

// ============================================================
// მთავარი loop
// ============================================================
function loop(){
  if(isRec&&vid.readyState>=3){
    const now=performance.now(), ts=(now-recStart)/1000;

    // 🟢 მწვანე სენსორი
    const wd=sampleEl(elSW,ctx8,8,8);
    let gc=0;
    for(let i=0;i<wd.length;i+=4) if(isGreen(wd[i],wd[i+1],wd[i+2],parseInt(greenSl.value))) gc++;
    if(gc>=4&&(ts-lastWheelT)>1.5){
      elSW.classList.add('act');
      wheelPasses.push(ts);
      lastWheelT=ts;
      setTimeout(()=>elSW.classList.remove('act'),150);
    }

    // 🥎 ბურთის სენსორი
    processBall(now,ts);
  }
  if(vid.requestVideoFrameCallback) vid.requestVideoFrameCallback(loop);
  else requestAnimationFrame(loop);
}
if(vid.requestVideoFrameCallback) vid.requestVideoFrameCallback(loop);
else requestAnimationFrame(loop);

// ============================================================
// ფიზიკა
// ============================================================
function calcPhysics(wheelMS,ballMS,gamma,offset){
  const ob=(2*Math.PI)/(ballMS/1000);
  const oc=5.30;
  if(ob<=oc) return{offset,t_drop:0};
  const td=Math.log(ob/oc)/gamma;
  const tball=(ob/gamma)*(1-Math.exp(-gamma*td));
  const blaps=tball/(2*Math.PI);
  const ow=(2*Math.PI)/(wheelMS/1000);
  const tw=ow*td;
  return{offset:offset+(((blaps*37)-(tw/(2*Math.PI)*37))%37),t_drop:td};
}

// ============================================================
// ანალიზი
// ============================================================
document.getElementById('btnAnalyze').addEventListener('click',()=>{
  const startN=parseInt(document.getElementById('startNum').value);
  const actualN=parseInt(document.getElementById('actualNum').value);
  if(isNaN(startN)||isNaN(actualN)) return alert('შეავსეთ რიცხვები!');

  let wLaps=[];
  wheelPasses.forEach(t=>{ if(!wLaps.length||(t-wLaps[wLaps.length-1])>1.5) wLaps.push(t); });
  if(wLaps.length<2) return alert('დაფის არასაკმარისი მონაცემები!');

  const t0=wLaps[wLaps.length-2], t1=wLaps[wLaps.length-1];
  const wheelMS=Math.round((t1-t0)*1000);

  // ბურთის interpolation
  let fbp=[];
  if(ballPasses.length){
    fbp.push(ballPasses[0]); let elt=0.5;
    for(let i=1;i<ballPasses.length;i++){
      if(ballPasses[i]-ballPasses[i-1]<0.30) continue;
      let lc=Math.round((ballPasses[i]-ballPasses[i-1])/elt);
      if(lc<1)lc=1;
      if(lc>1&&lc<5){ const st=(ballPasses[i]-ballPasses[i-1])/lc; for(let j=1;j<lc;j++) fbp.push(ballPasses[i-1]+st*j); }
      fbp.push(ballPasses[i]); elt=(ballPasses[i]-ballPasses[i-1])/lc;
    }
  }

  const validHits=fbp.filter(t=>t>=t0&&t<=t1);
  if(validHits.length<2) return alert('ბურთის არასაკმარისი იმპულსები!');

  let ivs=[];
  for(let i=1;i<validHits.length;i++){
    const d=Math.round((validHits[i]-validHits[i-1])*1000);
    if(d>350&&d<1800) ivs.push(d);
  }
  if(!ivs.length) return alert('ინტერვალები ვერ მოიძებნა!');

  let ballMS=ivs[ivs.length-1], warn='';
  if(ivs.length>=2){ const prev=ivs[ivs.length-2]; if(ballMS<prev*0.75){ballMS=Math.round(prev*1.06);warn='⚠️ აჩქარების ანომალია გაიფილტრა!';} }

  const run=calcPhysics(wheelMS,ballMS,AI.gamma,AI.hardwareOffset);
  const lapDur=wheelMS/1000;
  let lp=((validHits[validHits.length-1]-t0)/lapDur)%1; if(lp<0)lp+=1;

  let ei=(WHL.indexOf(startN)+Math.round(lp*37))%37;
  let pi=Math.round(ei+run.offset)%37; if(pi<0)pi+=37;
  const tN=WHL[pi];

  // AI სწავლება
  let ai=WHL.indexOf(actualN), err=ai-pi;
  if(err>18)err-=37; if(err<-18)err+=37;
  if(Math.abs(err)>0&&Math.abs(err)<15){
    AI.hardwareOffset+=err*0.12;
    if(run.t_drop>0) AI.gamma-=(err/run.t_drop)*0.0008;
    AI.gamma=Math.max(0.08,Math.min(0.22,AI.gamma));
    AI.spins++; saveBrain(); updateDash();
  }

  const n3=WHL[(pi-3+37)%37],n2=WHL[(pi-2+37)%37],n1=WHL[(pi-1+37)%37];
  const p1=WHL[(pi+1)%37],p2=WHL[(pi+2)%37],p3=WHL[(pi+3)%37];
  const zone=[tN,n1,n2,n3,p1,p2,p3];

  let html=`<div class="ratio-box"><span>⚙️${wheelMS}ms</span><span>🥎${ballMS}ms</span><span>🎯R:${(wheelMS/ballMS).toFixed(1)}</span></div>`;
  if(warn) html+=`<div class="warn-box">${warn}</div>`;
  html+=`<div class="pred-box">🔮<b>პროგნოზი: ${tN}</b><br>🎯ზონა:<span style="color:#fbbf24"> ${n3} ${n2} ${n1} [${tN}] ${p1} ${p2} ${p3}</span><br>`;
  html+=`<div>${zone.includes(actualN)?'✅<b>მოგება!</b>':'❌ რეალური:['+actualN+'] (AI შესწორდა)'}</div></div>`;
  output.innerHTML=html;
});

initCamera();
</script>
</body>
</html>
