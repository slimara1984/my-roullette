<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        video { width: 100%; max-width: 400px; margin-top: 20px; border: 2px solid #333; }
    </style>
</head>
<body>

    <h1>Roulette App</h1>
    <button onclick="startCamera()">ვიდეოს ჩართვა</button>
    <br>
    <video id="videoElement" autoplay playsinline></video>

    <script>
        async function startCamera() {
            const video = document.getElementById('videoElement');
            try {
                // ცდილობს ჩართოს კამერა (ეს ყველაზე სტაბილურია აიფონზე)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("შეცდომა:", err);
                alert("ვიდეოს ჩართვა ვერ მოხერხდა. დარწმუნდით, რომ აპლიკაციას აქვს კამერის ნებართვა.");
            }
        }
    </script>
</body>
</html>
